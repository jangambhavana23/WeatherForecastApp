<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather Forecast Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-slate-100 min-h-screen transition-all duration-500">

    <!-- Background Overlay -->
    <div id="backgroundOverlay"></div>

    <div class="container mx-auto px-4 py-6">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-700">
                Weather Forecast Dashboard
            </h1>

            <p class="text-gray-600 mt-2">
                Search weather by city or use your current location
            </p>
        </div>

        <!-- Error Toast -->
        <div id="errorBox"
            class="hidden fixed top-5 right-5 z-50 bg-red-500 text-white px-5 py-3 rounded-lg shadow-lg">
        </div>

        <!-- Alert Toast -->
        <div id="alertBox"
            class="hidden fixed top-20 right-5 z-50 bg-orange-500 text-white px-5 py-3 rounded-lg shadow-lg">
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden flex justify-center my-5">
            <div
                class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600">
            </div>
        </div>

        <!-- Search Section -->
        <div class="bg-white shadow-xl rounded-xl p-6 mb-6">

            <div
                class="flex flex-col md:flex-row gap-4 items-center">

                <input
                    type="text"
                    id="cityInput"
                    placeholder="Enter city name..."
                    class="w-full md:flex-1 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

                <button
                    id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg w-full md:w-auto">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Search
                </button>

                <button
                    id="locationBtn"
                    class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg w-full md:w-auto">
                    <i class="fa-solid fa-location-crosshairs"></i>
                    Current Location
                </button>

            </div>

            <!-- Recent Searches -->
            <div class="mt-4">

                <label class="block mb-2 font-medium text-gray-700">
                    Recent Searches
                </label>

                <select
                    id="recentCities"
                    class="w-full border border-gray-300 rounded-lg p-3">
                    <option value="">
                        No Recent Searches
                    </option>
                </select>

            </div>

        </div>

        <!-- Temperature Toggle -->
        <div class="flex justify-center gap-4 mb-6">

            <button
                id="celsiusBtn"
                class="bg-blue-500 text-white px-5 py-2 rounded-lg">
                °C
            </button>

            <button
                id="fahrenheitBtn"
                class="bg-purple-500 text-white px-5 py-2 rounded-lg">
                °F
            </button>

        </div>

        <!-- Current Weather Section -->
        <div
            id="weatherCard"
            class="hidden bg-white shadow-xl rounded-xl p-6 mb-8">

            <div
                class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">

                <!-- Left -->
                <div>

                    <h2
                        id="cityName"
                        class="text-3xl font-bold text-blue-700">
                    </h2>

                    <p
                        id="currentDate"
                        class="text-gray-500 mt-1">
                    </p>

                    <div class="mt-5 space-y-2">

                        <p class="text-lg">
                            🌡 Temperature:
                            <span id="temperature"></span>
                        </p>

                        <p class="text-lg">
                            💧 Humidity:
                            <span id="humidity"></span>
                        </p>

                        <p class="text-lg">
                            💨 Wind Speed:
                            <span id="wind"></span>
                        </p>

                        <p class="text-lg">
                            ☁ Condition:
                            <span id="condition"></span>
                        </p>

                    </div>

                </div>

                <!-- Right -->
                <div
                    class="flex flex-col justify-center items-center">

                    <img
                        id="weatherIcon"
                        src=""
                        alt="weather icon"
                        class="w-32 h-32">

                    <p
                        id="weatherDescription"
                        class="text-xl font-semibold text-center">
                    </p>

                </div>

            </div>

        </div>

        <!-- Forecast Heading -->
        <h2
            id="forecastHeading"
            class="hidden text-3xl font-bold mb-5 text-gray-800">
            5-Day Forecast
        </h2>

        <!-- Forecast Container -->
        <div
            id="forecastContainer"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
        </div>

    </div>

    <script src="./app.js"></script>

</body>
</html>
